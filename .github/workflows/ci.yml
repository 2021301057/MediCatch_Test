name: MediCatch CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Check gradlew exists
        id: check_gradlew
        run: |
          if [ -f "./backend/gradlew" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ gradlew 없음 - Spring Initializr로 프로젝트 생성 후 커밋 필요"
          fi

      - name: Grant execute permission for gradlew
        if: steps.check_gradlew.outputs.exists == 'true'
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Build with Gradle
        if: steps.check_gradlew.outputs.exists == 'true'
        working-directory: ./backend
        run: ./gradlew build -x test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check package.json exists
        id: check_frontend
        run: |
          if [ -f "./frontend/src/index.js" ] || [ -f "./frontend/src/index.tsx" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ React 소스 없음 - npx create-react-app 으로 생성 후 커밋 필요"
          fi

      - name: Install dependencies
        if: steps.check_frontend.outputs.exists == 'true'
        working-directory: ./frontend
        run: npm install

      - name: Build React
        if: steps.check_frontend.outputs.exists == 'true'
        working-directory: ./frontend
        run: npm run build
