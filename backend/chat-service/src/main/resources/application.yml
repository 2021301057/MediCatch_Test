spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:mysql://localhost:3306/medicatch_chat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 1234
    #    password: medicatch_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      timeout: 2000

server:
  port: 8002
  servlet:
    context-path: /

openai:
  api-key: ${OPENAI_API_KEY:sk-your-api-key-here}
  model: gpt-4o
  base-url: https://api.openai.com/v1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.medicatch: DEBUG
    okhttp3: DEBUG
