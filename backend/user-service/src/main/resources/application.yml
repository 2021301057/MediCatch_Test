spring:
  application:
    name: user-service
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://localhost:3306/medicatch_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 1234
    #    password: medicatch_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: 8001
  servlet:
    context-path: /
  error:
    include-message: always

jwt:
  secret: medicatch-secret-key-for-jwt-token-generation-2024-secure-key-make-it-long
  access-token-expire: 900000
  refresh-token-expire: 604800000

codef:
  api-client-id: ${CODEF_API_CLIENT_ID:YOUR_API_CLIENT_ID}
  api-client-secret: ${CODEF_API_CLIENT_SECRET:YOUR_API_CLIENT_SECRET}
  demo-client-id: ${CODEF_DEMO_CLIENT_ID:YOUR_DEMO_CLIENT_ID}
  demo-client-secret: ${CODEF_DEMO_CLIENT_SECRET:YOUR_DEMO_CLIENT_SECRET}
  public-key: ${CODEF_PUBLIC_KEY:}
  use-demo: ${CODEF_USE_DEMO:true}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.medicatch: DEBUG
    org.springframework.security: DEBUG
