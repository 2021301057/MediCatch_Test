spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/medicatch_user?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 1234
    #    password: medicatch_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: 8001
  servlet:
    context-path: /
  error:
    include-message: always

jwt:
  secret: medicatch-secret-key-for-jwt-token-generation-2024-secure-key-make-it-long
  access-token-expire: 900000
  refresh-token-expire: 604800000

codef:
  client-id: ${CODEF_CLIENT_ID:YOUR_CODEF_CLIENT_ID}
  client-secret: ${CODEF_CLIENT_SECRET:YOUR_CODEF_CLIENT_SECRET}
  token-url: https://api.codef.io/oauth/token
  rsa-public-key: ${CODEF_RSA_PUBLIC_KEY:}
  credit4u-register-url: ${CODEF_CREDIT4U_URL:https://api.codef.io/v1/kr/etc/credit4u/member/sign-up}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.medicatch: DEBUG
    org.springframework.security: DEBUG
