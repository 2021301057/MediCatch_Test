spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - JwtAuthenticationFilter

        # Health Service Routes
        - id: health-service
          uri: lb://health-service
          predicates:
            - Path=/api/health/**
          filters:
            - JwtAuthenticationFilter

        # Insurance Service Routes
        - id: insurance-service
          uri: lb://insurance-service
          predicates:
            - Path=/api/insurance/**
          filters:
            - JwtAuthenticationFilter

        # Analysis Service Routes
        - id: analysis-service
          uri: lb://analysis-service
          predicates:
            - Path=/api/analysis/**
          filters:
            - JwtAuthenticationFilter

        # Chat Service Routes
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - JwtAuthenticationFilter

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: 8000
  servlet:
    context-path: /

jwt:
  secret: medicatch-secret-key-for-jwt-token-generation-2024-secure-key-make-it-long

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.medicatch: DEBUG
    org.springframework.cloud.gateway: DEBUG
