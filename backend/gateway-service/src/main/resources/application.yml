spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      httpclient:
        response-timeout: 180s
        connect-timeout: 10000
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: SERVICE_UNAVAILABLE, BAD_GATEWAY
            methods: GET, POST, DELETE
            backoff:
              firstBackoff: 100ms
              maxBackoff: 1000ms
              factor: 2
              basedOnPreviousValue: false
      routes:
        # User Service Routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - JwtAuthenticationFilter

        # Health Service Routes
        - id: health-service
          uri: lb://health-service
          predicates:
            - Path=/api/health/**
          filters:
            - JwtAuthenticationFilter
          metadata:
            response-timeout: 180000
            connect-timeout: 10000

        # Insurance Service Routes
        - id: insurance-service
          uri: lb://insurance-service
          predicates:
            - Path=/api/insurance/**
          filters:
            - JwtAuthenticationFilter
          metadata:
            response-timeout: 120000
            connect-timeout: 10000

        # Analysis Service Routes
        - id: analysis-service
          uri: lb://analysis-service
          predicates:
            - Path=/api/analysis/**
          filters:
            - JwtAuthenticationFilter

        # Chat Service Routes
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - JwtAuthenticationFilter

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

    loadbalancer:
      cache:
        ttl: 5s
        capacity: 256

server:
  port: 8000
  servlet:
    context-path: /

jwt:
  secret: medicatch-secret-key-for-jwt-token-generation-2024-secure-key-make-it-long

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.medicatch: DEBUG
    org.springframework.cloud.gateway: DEBUG
